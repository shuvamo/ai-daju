<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ai Daju — Your Personal Big Brother AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <div class="avatar-wrap">
        <div class="avatar-ring"></div>
        <div class="avatar">🤝</div>
      </div>
      <div class="header-info">
        <div class="header-name">Ai <span>Daju</span></div>
        <div class="header-sub">Your Personal Big Brother AI</div>
      </div>
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Checking...</span>
      </div>
      <button id="clearBtn" title="Clear chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
        </svg>
        <span>Clear</span>
      </button>
    </header>

    <!-- Quick suggestion chips -->
    <div class="suggestions">
      <button class="suggestion-chip" data-msg="I need some life advice today">💡 Life Advice</button>
      <button class="suggestion-chip" data-msg="Help me stay motivated with my goals">🔥 Motivation</button>
      <button class="suggestion-chip" data-msg="I'm feeling stressed and overwhelmed">😮‍💨 I'm stressed</button>
      <button class="suggestion-chip" data-msg="Can you help me make a tough decision?">🤔 Big Decision</button>
      <button class="suggestion-chip" data-msg="Give me some tips to be more productive">⚡ Productivity</button>
    </div>

    <!-- Chat messages -->
    <div id="chatMessages">
      <!-- Typing indicator (shown while waiting) -->
      <div id="typingIndicator">
        <span class="typing-label">Daju is typing</span>
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-box">
        <textarea
          id="userInput"
          placeholder="Talk to Daju… he's listening 👂"
          rows="1"
          maxlength="500"
        ></textarea>
        <button id="sendBtn" disabled title="Send message (Enter)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span id="charCount">0/500</span>
        <span class="input-hint">Enter to send · Shift+Enter for new line</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
